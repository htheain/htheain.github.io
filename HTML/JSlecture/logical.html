<body>
    <h1>Logical operater</h1>
    <script>
        //of operator ||
        let num1 = 10;
        let num2 =20;
        console.log(num1<num2 || num1 == num2); // true || false 

        //AND operator ||
         console.log(num1< num2 && num1 == num2)//true &&false=false

         //Not operator!
         let num3 = 10;
         console.log(!num3); //fale
    </script>
</body>
