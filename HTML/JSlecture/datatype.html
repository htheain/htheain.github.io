<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Data Type</h1>

    <script>
        //string data type
        let name = "Nowel";
        console.log(name);
        console.log(typeof(name));

        //numeric data type
        let age = 29;
         console.log(age);
        console.log(typeof (age));
    
     //bollen data type(true or false)
     let isStudent = true;
     console.log(isStudent);
     console.log(typeof(isStudent));

     //undified data type
     let undifinedVariable;
     console.log(undifinedVariable);
     console.log(typeof(undifinedVariable));

     //null data type
     let nullVariable =null;
     console.log(nullVariable);
     console.log(typeof(nullVariable));

     //array data type
    let studentList =new Array('Mg Mg','Aung Aung','Hla Hla');
    console.log(studentList);
    console.log(typeof(studentList));
    console.log(studentList.length);
    console.log(studentList[2]);

    //object data type
    let student = {
        //key:value
        name :"Nowel",
        age : 19,
        address :"TaungTha",
        education :"KTU",


    }
    console.log(student);
    console.log(typeof(student));
    console.log(student.education);


      </script>
</body>
</html>
